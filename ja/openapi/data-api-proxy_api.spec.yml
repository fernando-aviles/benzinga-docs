      description: 指定したシンボルの株価関連比率を取得します。株価収益率、株価売上高倍率、その他の株価ベースの比率などの指標が含まれます。
      operationId: get-share-price-ratios-v3
      parameters:
        - description: "株式ティッカーシンボルのカンマ区切りリスト（例: AAPL, MSFT）"
          in: query
          name: symbols
          required: true
          schema:
            type: string
        - description: "クエリの開始日。形式: YYYY-MM-DD。対応形式: YYYY-MM-DD、YTD（年初来）、1MONTH/1m/1M（1か月前）"
          in: query
          name: from
          schema:
            type: string
        - description: YYYY-MM-DD形式のクエリ終了日です。この日付を含む、それ以前のデータを返します。
          in: query
          name: to
          schema:
            type: string
        - description: "レポート種別フィルター。値: TTM（過去12か月）, A（報告値）, R（修正版）, P（暫定値）"
          in: query
          name: date
          schema:
            type: string
      responses:
        "200":
          description: 株価比率データ
          content:
            application/json:
              schema:
                items:
                  type: string
                type: array
        "400":
          description: 不正なリクエスト
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: 内部サーバーエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
      security:
        - ApiKeyAuth: []
      summary: 株価比率 V3 を取得
      tags:
        - Fundamentals
