openapi: 3.0.0
info:
  contact: {}
  description: このREST APIは、ファンダメンタルズの検索と詳細取得のためのエンドポイントを提供します。
  termsOfService: http://swagger.io/terms/
  title: Data API Proxy
  version: 2.0.0
paths:
  /api/v1/market/movers:
    get:
      description: 指定したフィルターに基づいて、値動きの大きい銘柄のデータを取得します。指定したセッションおよび時間範囲内で大きく値動きした株式を返します。高度なフィルタリング向けに、カスタムスクリーナークエリおよびmoversクエリをサポートしています。
      operationId: get-movers
      parameters:
        - description: 返される結果の最大件数です。レスポンスのサイズを制御します。
          in: query
          name: maxResults
          schema:
            type: integer
        - description: "moversデータの開始日/時刻です。形式: YYYY-MM-DD または YYYY-MM-DDTHH:MM:SS"
          in: query
          name: from
          schema:
            type: string
        - description: "moversデータの終了日/時刻です。形式: YYYY-MM-DD または YYYY-MM-DDTHH:MM:SS"
          in: query
          name: to
          schema:
            type: string
        - description: "moversを絞り込む取引セッションです。例: PRE_MARKET、REGULAR、AFTER_MARKET"
          in: query
          name: session
          schema:
            type: string
        - description: 特定の条件に基づいて証券を絞り込むためのカスタムスクリーナークエリ文字列
          in: query
          name: screenerQuery
          schema:
            type: string
        - description: 特定の値動きパターンまたはしきい値を定義するためのカスタム値動きクエリ文字列
          in: query
          name: moversQuery
          schema:
            type: string
      responses:
        "200":
          description: 値動き銘柄データ
          content:
            application/json:
              schema:
                type: object
        "400":
          description: 不正なリクエスト - 無効なパラメータ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: 内部サーバーエラー
          content:
            application/json:
              schema:
                type: object
      security:
        - ApiKeyAuth: []
      summary: 値動きの大きい銘柄
      tags:
        - Market Data
  /api/v1/quoteDelayed:
    get:
      description: シンボル、ISIN、またはCIKのリストに対する遅延クオートを取得します
      operationId: get-quote-delayed-v1
      parameters:
        - description: 株式ティッカーシンボルのカンマ区切りリスト。symbols、isin、またはcikのいずれか1つ以上が必要です。
          in: query
          name: symbols
          schema:
            type: string
        - description: ISIN識別子のカンマ区切りリスト。最大50件。symbols、isin、またはcikのいずれか1つ以上が必要です。
          in: query
          name: isin
          schema:
            type: string
        - description: CIK識別子のカンマ区切りリスト。symbols、isin、またはcikのいずれか1つ以上が必要です。
          in: query
          name: cik
          schema:
            type: string
      responses:
        "200":
          description: 遅延クオートを含むJSONオブジェクトを返します
          content:
            application/json:
              schema:
                type: string
        "400":
          description: 不正なリクエスト
          content:
            application/json:
              schema:
                type: string
        "500":
          description: 内部サーバーエラー
          content:
            application/json:
              schema:
                type: string
      security:
        - ApiKeyAuth: []
      summary: 遅延クオートを取得 V1
      tags:
        - QuoteDelayed
  /api/v1/shortinterest:
    get:
      description: 指定された証券の空売り残高データを取得します。空売り株数、買い戻し日数、空売り比率に関する情報が含まれます。FINRAレポートデータの追加や日付範囲によるフィルタリングにも対応しています。
      operationId: get-short-interest
      parameters:
        - description: "株式ティッカーシンボルのカンマ区切りリスト（例: AAPL,MSFT,TSLA）。必須。"
          in: query
          name: symbols
          required: true
          schema:
            type: string
        - description: "FINRAの空売り残高レポートデータを含めます。デフォルト: false"
          in: query
          name: finraReport
          schema:
            type: boolean
        - description: ページネーション用のページ番号。pageSizeパラメータと併用します。
          in: query
          name: page
          schema:
            type: integer
        - description: 1ページあたりの結果数。デフォルト値はエンドポイントの設定によって異なります。
          in: query
          name: pageSize
          schema:
            type: integer
        - description: "空売り残高データの開始日。形式: YYYY-MM-DD"
          in: query
          name: from
          schema:
            type: string
        - description: "空売り残高データの終了日。形式: YYYY-MM-DD"
          in: query
          name: to
          schema:
            type: string
      responses:
        "200":
          description: リクエストされたsymbolsの空売り残高データ
          content:
            application/json:
              schema:
                type: object
        "400":
          description: 不正なリクエスト - symbolsパラメータが不足しているか無効です
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: 内部サーバーエラー
          content:
            application/json:
              schema:
                type: object
      security:
        - ApiKeyAuth: []
      summary: 空売り残高データ
      tags:
        - Market Data
  /api/v2.1/fundamentals:
    get:
      description: 指定された証券の拡張ファンダメンタルズデータを取得します。これは、追加のデータフィールドと優れたパフォーマンスを備えたV2エンドポイントの改良版です。更新済みのデータソースから、包括的な財務指標、各種比率、および企業情報を返します。
      operationId: get-fundamentals-v21
      parameters:
        - description: "株式ティッカーシンボルのカンマ区切りリスト（例: AAPL,MSFT,GOOGL）。必須。"
          in: query
          name: symbols
          required: true
          schema:
            type: string
        - description: "この日付以降の結果に絞り込みます。形式: YYYY-MM-DD（例: 2024-01-01）"
          in: query
          name: asOf
          schema:
            type: string
        - description: "財務報告期間のperiodフィルタ。サポートされる値:
            Q1（第1四半期）、Q2（第2四半期）、Q3（第3四半期）、Q4（第4四半期）、FY（会計年度）、TTM（直近12か月）"
          in: query
          name: period
          schema:
            type: string
        - description: "取得する財務レポートの種別。サポートされる値: TTM（直近12か月）、A（当初報告値）、R（修正再表示値）、P（速報値）"
          in: query
          name: reportType
          schema:
            type: string
      responses:
        "200":
          description: 追加の指標および比率を含む拡張ファンダメンタルズデータ
          content:
            application/json:
              schema:
                type: object
        "400":
          description: 不正なリクエスト - symbolsパラメータが不足しているか無効です
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: 内部サーバーエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
      security:
        - ApiKeyAuth: []
      summary: 企業ファンダメンタルズ V2.1
      tags:
        - Fundamentals
  /api/v2.1/fundamentals/alphaBeta:
    get:
      description: 指定されたsymbolsのアルファおよびベータ指標を取得します。これらの指標は、市場に対する相対的なボラティリティとパフォーマンスを示します。
      operationId: get-alpha-beta-v21
      parameters:
        - description: "symbolsのカンマ区切りリスト（例: AAPL, MSFT）"
          in: query
          name: symbols
          required: true
          schema:
            type: string
        - description: このパラメータで指定した日付以上の結果を返します（YYYY-MM-DD）
          in: query
          name: asOf
          schema:
            type: string
        - description: "返される結果の期間を指定します（例: Q1、2023）"
          in: query
          name: period
          schema:
            type: string
        - description: "レポート種別: TTM（直近12か月）、A（当初報告）、R（修正報告）、P（速報値）"
          in: query
          name: reportType
          schema:
            type: string
      responses:
        "200":
          description: アルファ・ベータデータ
          content:
            application/json:
              schema:
                type: string
        "400":
          description: 不正なリクエスト
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: 内部サーバーエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
      security:
        - ApiKeyAuth: []
      summary: アルファ・ベータを取得 V2.1
      tags:
        - Fundamentals
  /api/v2.1/fundamentals/assetClassification:
    get:
      description: 指定したsymbolsについて、セクター、業種、その他の分類メタデータを含む資産分類の詳細を取得します。ポートフォリオの分類や分析に役立ちます。
      operationId: get-asset-classification-v21
      parameters:
        - description: "symbolsのカンマ区切りリスト（例: AAPL, MSFT）"
          in: query
          name: symbols
