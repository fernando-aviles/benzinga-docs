      security:
        - ApiKeyAuth: []
      summary: 企業プロフィール情報 V2.1
      tags:
        - Fundamentals
  /api/v2.1/fundamentals/earningRatios:
    get:
      description: シンボルのリストに対する収益比率を取得します。PER、EPS、そのほかの収益関連比率などの指標が含まれます。
      operationId: get-earning-ratios-v21
      parameters:
        - description: "シンボルをカンマ区切りで指定したリスト（例: AAPL, MSFT）"
          in: query
          name: symbols
          required: true
          schema:
            type: string
        - description: このパラメータで指定した日付（YYYY-MM-DD）以降の結果を返します
          in: query
          name: asOf
          schema:
            type: string
        - description: "返される結果の期間を指定します（例: Q1, 2023）"
          in: query
          name: period
          schema:
            type: string
        - description: "レポート種別: TTM（直近12か月）、A（当初報告値）、R（修正再表示値）、P（暫定値）"
          in: query
          name: reportType
          schema:
            type: string
      responses:
        "200":
          description: 収益比率データ
          content:
            application/json:
              schema:
                type: string
        "400":
          description: 不正なリクエスト
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: 内部サーバーエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
      security:
        - ApiKeyAuth: []
      summary: 収益比率を取得 V2.1
      tags:
        - Fundamentals
  /api/v2.1/fundamentals/earningReports:
    get:
      description: 指定した証券の詳細な決算レポートを取得します。四半期報告書および年次報告書に基づく売上高、1株当たり利益（EPS）、EBITDA、純利益、そのほかの主要な財務実績が含まれます。企業の財務パフォーマンスや、時系列での業績トレンドの分析に不可欠です。
      operationId: get-earnings-reports-v21
      parameters:
        - description: "株式ティッカーシンボルをカンマ区切りで指定したリスト（例: AAPL,MSFT,GOOGL）。必須です。"
          in: query
          name: symbols
          required: true
          schema:
            type: string
        - description: "この日付以降の結果で絞り込みます。形式: YYYY-MM-DD（例: 2024-01-01）"
          in: query
          name: asOf
          schema:
            type: string
        - description: "財務報告期間で絞り込みます。サポートされる値: Q1、Q2、Q3、Q4（四半期）、FY（会計年度）、TTM（直近12か月）"
          in: query
          name: period
          schema:
            type: string
        - description: "財務レポートの種別です。サポートされる値: TTM（直近12か月）、A（当初報告値）、R（修正再表示値）、P（暫定発表）"
          in: query
          name: reportType
          schema:
            type: string
      responses:
        "200":
          description: 決算レポートデータ
          content:
            application/json:
              schema:
                type: object
        "400":
          description: 不正なリクエスト - symbols パラメータが不足しているか無効です
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: 内部サーバーエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
      security:
        - ApiKeyAuth: []
      summary: 四半期および年次の収益レポート V2.1
      tags:
        - Fundamentals
