          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: 内部サーバーエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
      security:
        - ApiKeyAuth: []
      summary: 業務比率 V2.1 を取得
      tags:
        - Fundamentals
  /api/v2.1/fundamentals/shareClass:
    get:
      description: 特定のsymbolsに対応する株式クラス情報を取得します。株式クラスID、通貨、その他の関連メタデータを含む詳細な株式構成データを返します。
      parameters:
        - description: "symbolsのカンマ区切りリスト（例: AAPL, MSFT）"
          in: query
          name: symbols
          required: true
