            type: string
        - description: このパラメータで指定したdate以上の日付の結果を返します（YYYY-MM-DD）
          in: query
          name: asOf
          schema:
            type: string
        - description: "返される結果の期間を指定します（例: Q1、2023）"
          in: query
          name: period
          schema:
            type: string
        - description: "レポート種別: TTM（直近12か月）、A（当初報告）、R（修正報告）、P（速報値）"
          in: query
          name: reportType
          schema:
            type: string
      responses:
        "200":
          description: 資産分類データ
          content:
            application/json:
              schema:
                type: string
        "400":
          description: 不正なリクエスト
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: 内部サーバーエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
      security:
        - ApiKeyAuth: []
      summary: 資産分類を取得 V2.1
      tags:
        - Fundamentals
  /api/v2.1/fundamentals/company:
    get:
      description: 主要指標、業務統計、過去の財務実績を含む、企業固有の詳細な財務データを取得します。基本的なファンダメンタルズを超える、包括的な企業財務の全体像を提供します。
      operationId: get-company-v21
      parameters:
        - description: "株式ティッカーのカンマ区切りリスト（例: AAPL,MSFT,GOOGL）。必須です。"
