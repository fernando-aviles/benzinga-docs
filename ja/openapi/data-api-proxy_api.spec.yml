openapi: 3.0.0
info:
  contact: {}
  description: この REST API は、ファンダメンタルズを検索し、その詳細を取得するためのエンドポイントを提供します。
  termsOfService: http://swagger.io/terms/
  title: Data API Proxy
  version: 2.0.0
paths:
  /api/v1/market/movers:
    get:
      description: 指定したフィルターに基づいて値動き銘柄データを取得します。指定したセッションと時間範囲内で大きく変動した銘柄を返します。高度なフィルタリングのために、カスタムのスクリーナークエリと
        movers クエリをサポートしています。
      operationId: get-movers
      parameters:
        - description: 返す結果の最大件数です。レスポンスのサイズを制御します。
          in: query
          name: maxResults
          schema:
            type: integer
        - description: "movers データの開始日時です。形式: YYYY-MM-DD または YYYY-MM-DDTHH:MM:SS"
          in: query
          name: from
          schema:
            type: string
        - description: "movers データの終了日時です。形式: YYYY-MM-DD または YYYY-MM-DDTHH:MM:SS"
          in: query
          name: to
          schema:
            type: string
        - description: "movers を絞り込むための取引セッションです。例: PRE_MARKET、REGULAR、AFTER_MARKET"
          in: query
          name: session
          schema:
            type: string
        - description: 特定の条件に基づいて証券を絞り込むためのカスタムスクリーナークエリ文字列
          in: query
          name: screenerQuery
          schema:
            type: string
        - description: 特定の値動きパターンまたはしきい値を定義するためのカスタム movers クエリ文字列
          in: query
          name: moversQuery
          schema:
            type: string
      responses:
        "200":
          description: マーケットムーバーのデータ
          content:
            application/json:
              schema:
                type: object
        "400":
          description: 不正なリクエスト - 無効なパラメータ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: 内部サーバーエラー
          content:
            application/json:
              schema:
                type: object
      security:
        - ApiKeyAuth: []
      summary: 値動き銘柄
      tags:
        - Market Data
  /api/v1/quoteDelayed:
    get:
      description: シンボル、ISIN、または CIK のリストに対する遅延クオートを取得します
      operationId: get-quote-delayed-v1
      parameters:
        - description: 株式ティッカーシンボルのカンマ区切りリスト。symbols、isin、または cik のいずれか 1 つ以上が必要です。
          in: query
          name: symbols
          schema:
            type: string
        - description: ISIN 識別子のカンマ区切りリスト。最大 50 件。symbols、isin、または cik のいずれか 1 つ以上が必要です。
          in: query
          name: isin
          schema:
            type: string
        - description: CIK 識別子のカンマ区切りリスト。symbols、isin、または cik のいずれか 1 つ以上が必要です。
          in: query
          name: cik
          schema:
            type: string
      responses:
        "200":
          description: 遅延クオートを含む JSON オブジェクトを返します
          content:
            application/json:
              schema:
                type: string
        "400":
          description: 不正なリクエスト
          content:
            application/json:
              schema:
                type: string
        "500":
          description: 内部サーバーエラー
          content:
            application/json:
              schema:
                type: string
      security:
        - ApiKeyAuth: []
      summary: 遅延クオート V1 を取得
      tags:
        - QuoteDelayed
  /api/v1/shortinterest:
    get:
      description: 指定した証券の空売り残高データを取得します。空売り株数、買い戻し日数、空売り比率に関する情報が含まれます。FINRA
        のレポートデータおよび日付範囲フィルタリングに任意で対応しています。
      operationId: get-short-interest
      parameters:
        - description: "株式ティッカーシンボルのカンマ区切りリスト（例: AAPL,MSFT,TSLA）。必須です。"
          in: query
          name: symbols
          required: true
          schema:
            type: string
        - description: "FINRA の空売り残高レポートデータを含めます。デフォルト: false"
          in: query
          name: finraReport
          schema:
            type: boolean
        - description: ページネーション用のページ番号。pageSize パラメータとともに使用します。
          in: query
          name: page
          schema:
            type: integer
        - description: 1 ページあたりの結果数。デフォルト値はエンドポイントの設定によって異なります。
          in: query
          name: pageSize
          schema:
            type: integer
        - description: "空売り残高データの開始日。形式: YYYY-MM-DD"
          in: query
          name: from
          schema:
            type: string
        - description: "空売り残高データの終了日。形式: YYYY-MM-DD"
          in: query
          name: to
          schema:
            type: string
      responses:
        "200":
          description: 要求された symbols の空売り残高データ
          content:
            application/json:
              schema:
                type: object
        "400":
          description: 不正なリクエスト - symbols パラメータが不足しているか無効です
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: 内部サーバーエラー
          content:
            application/json:
              schema:
                type: object
      security:
        - ApiKeyAuth: []
      summary: 空売り残高データ
      tags:
        - Market Data
  /api/v2.1/fundamentals:
    get:
      description: 指定した証券の拡張ファンダメンタルズデータを取得します。これは v2
        エンドポイントの改良版で、追加のデータフィールドとより高いパフォーマンスを備えています。更新されたデータソースから、包括的な財務指標、各種比率、会社情報を返します。
      operationId: get-fundamentals-v21
      parameters:
        - description: "株式ティッカーシンボルのカンマ区切りリスト（例: AAPL,MSFT,GOOGL）。必須です。"
          in: query
          name: symbols
          required: true
          schema:
            type: string
        - description: "この日付以降の結果でフィルタリングします。形式: YYYY-MM-DD（例: 2024-01-01）"
          in: query
          name: asOf
          schema:
            type: string
        - description: "財務報告期間の期間フィルタ。サポートされる値: Q1（第 1 四半期）、Q2（第 2 四半期）、Q3（第 3 四半期）、Q4（第 4
            四半期）、FY（会計年度）、TTM（直近 12 か月）"
          in: query
          name: period
          schema:
            type: string
        - description: "取得する財務レポートの種類。サポートされる値: TTM（直近 12 か月）、A（当初報告値）、R（修正後の値）、P（暫定発表値）"
          in: query
          name: reportType
          schema:
            type: string
      responses:
        "200":
          description: 追加の指標と比率を含む拡張ファンダメンタルズデータ
          content:
            application/json:
              schema:
                type: object
        "400":
          description: 不正なリクエスト - symbols パラメータが不足しているか無効です
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: 内部サーバーエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
      security:
        - ApiKeyAuth: []
      summary: 会社ファンダメンタルズ V2.1
      tags:
        - Fundamentals
  /api/v2.1/fundamentals/alphaBeta:
    get:
      description: 指定した symbols の Alpha および Beta
        指標を取得します。これらの指標は、市場に対するボラティリティとパフォーマンスを示します。
      operationId: get-alpha-beta-v21
      parameters:
        - description: "symbols のカンマ区切りリスト（例: AAPL, MSFT）"
          in: query
          name: symbols
          required: true
          schema:
            type: string
        - description: このパラメータで指定した日付以降の結果を返します（YYYY-MM-DD）
          in: query
          name: asOf
          schema:
            type: string
        - description: "返される結果の期間を指定します（例: Q1、2023）"
          in: query
          name: period
          schema:
            type: string
        - description: "レポートタイプ: TTM（過去12か月累計）、A（当初報告値）、R（修正再表示）、P（速報値）"
          in: query
          name: reportType
          schema:
            type: string
      responses:
        "200":
          description: アルファ・ベータデータ
          content:
            application/json:
              schema:
                type: string
        "400":
          description: 不正なリクエスト
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: 内部サーバーエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
      security:
        - ApiKeyAuth: []
      summary: アルファ・ベータ V2.1 を取得
      tags:
        - Fundamentals
  /api/v2.1/fundamentals/assetClassification:
    get:
      description: 指定したsymbolsについて、セクター、業種、その他の分類メタデータを含む資産分類の詳細を取得します。ポートフォリオの分類や分析に役立ちます。
      operationId: get-asset-classification-v21
      parameters:
        - description: "シンボルのカンマ区切りリスト（例: AAPL, MSFT）"
          in: query
          name: symbols
          required: true
          schema:
            type: string
        - description: このパラメータで指定した日付以上の結果を返します（YYYY-MM-DD）
          in: query
          name: asOf
          schema:
            type: string
        - description: "返される結果の期間を指定します（例: Q1、2023）"
          in: query
          name: period
          schema:
            type: string
        - description: "レポートタイプ: TTM（過去12か月累計）、A（当初報告値）、R（修正再表示）、P（速報値）"
          in: query
          name: reportType
          schema:
            type: string
      responses:
        "200":
          description: 資産分類データ
          content:
            application/json:
              schema:
                type: string
        "400":
          description: 不正なリクエスト
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: 内部サーバーエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
      security:
        - ApiKeyAuth: []
      summary: 資産分類 V2.1 を取得
      tags:
        - Fundamentals
  /api/v2.1/fundamentals/company:
    get:
      description: 主要指標、業務統計、過去の財務実績を含む、企業固有の詳細な財務データを取得します。基本的なファンダメンタルズを超えて、企業の財務状況を包括的に把握できます。
      operationId: get-company-v21
      parameters:
        - description: "株式ティッカーシンボルのカンマ区切りリスト（例: AAPL,MSFT,GOOGL）。必須です。"
          in: query
          name: symbols
          required: true
          schema:
            type: string
        - description: "この日付以降の結果で絞り込みます。形式: YYYY-MM-DD（例: 2024-01-01）"
          in: query
          name: asOf
          schema:
            type: string
        - description: "財務報告期間のフィルターです。サポートされる値: Q1、Q2、Q3、Q4（四半期）、FY（会計年度）、TTM（過去12か月累計）"
          in: query
          name: period
          schema:
            type: string
        - description: "財務レポートの種類です。サポートされる値: TTM（過去12か月累計）、A（当初報告値）、R（修正再表示値）、P（速報値）"
          in: query
          name: reportType
          schema:
            type: string
      responses:
        "200":
          description: 企業財務データ
          content:
            application/json:
              schema:
                type: object
        "400":
          description: 不正なリクエスト - symbolsパラメータが不足しているか無効です
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: 内部サーバーエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
      security:
        - ApiKeyAuth: []
      summary: 会社金融データ V2.1
      tags:
        - Fundamentals
  /api/v2.1/fundamentals/companyProfile:
    get:
      description: 事業内容、業種分類、セクターの詳細、本社所在地、主要経営陣、その他の企業メタデータを含む包括的な企業プロフィール情報を取得します。企業の背景や組織構造を理解するうえで重要です。
      operationId: get-company-profile-v21
      parameters:
        - description: "株式ティッカーシンボルのカンマ区切りリスト（例: AAPL,MSFT,GOOGL）。必須です。"
          in: query
          name: symbols
          required: true
          schema:
            type: string
        - description: "この日付以降の結果で絞り込みます。形式: YYYY-MM-DD（例: 2024-01-01）"
          in: query
          name: asOf
          schema:
            type: string
        - description: "財務報告期間のフィルターです。サポートされる値: Q1、Q2、Q3、Q4（四半期）、FY（会計年度）、TTM（過去12か月累計）"
          in: query
          name: period
          schema:
            type: string
        - description: "財務レポートの種類です。サポートされる値: TTM（過去12か月累計）、A（当初報告値）、R（修正再表示値）、P（速報値）"
          in: query
          name: reportType
          schema:
            type: string
      responses:
        "200":
          description: 企業プロフィールデータ
          content:
            application/json:
              schema:
                type: object
        "400":
          description: 不正なリクエスト - symbolsパラメータが不足しているか無効です
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: 内部サーバーエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
      security:
        - ApiKeyAuth: []
      summary: 会社プロフィール情報 V2.1
      tags:
        - Fundamentals
  /api/v2.1/fundamentals/earningRatios:
    get:
      description: シンボルのリストに対する収益性比率を取得します。株価収益率、EPS、その他の収益関連の比率指標が含まれます。
      operationId: get-earning-ratios-v21
      parameters:
        - description: "symbols のカンマ区切りリスト（例: AAPL, MSFT）"
          in: query
          name: symbols
          required: true
          schema:
            type: string
        - description: このパラメータで指定した日付以上の結果を返します（YYYY-MM-DD）
          in: query
          name: asOf
          schema:
            type: string
        - description: "返される結果の期間を指定します（例: Q1, 2023）"
          in: query
          name: period
          schema:
            type: string
        - description: "レポート種別: TTM（直近12か月）, A（当初報告値）, R（修正再表示値）, P（速報値）"
          in: query
          name: reportType
          schema:
            type: string
      responses:
        "200":
          description: 収益性比率データ
          content:
            application/json:
              schema:
                type: string
        "400":
          description: 不正なリクエスト
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: 内部サーバーエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
      security:
        - ApiKeyAuth: []
      summary: 収益比率 V2.1 を取得
      tags:
        - Fundamentals
  /api/v2.1/fundamentals/earningReports:
    get:
      description: 指定した証券の詳細な決算レポートを取得します。四半期および年次レポートから、売上高、1株当たり利益（EPS）、EBITDA、純利益、その他の主要な財務実績データが含まれます。企業の財務実績や収益トレンドを時系列で分析するうえで重要です。
      operationId: get-earnings-reports-v21
      parameters:
        - description: "株式ティッカーシンボルのカンマ区切りリスト（例: AAPL,MSFT,GOOGL）。必須。"
          in: query
          name: symbols
          required: true
          schema:
            type: string
        - description: "この日付以降の結果で絞り込みます。形式: YYYY-MM-DD（例: 2024-01-01）"
          in: query
          name: asOf
          schema:
            type: string
        - description: "財務報告期間のフィルター。対応値: Q1, Q2, Q3, Q4（四半期）, FY（会計年度）, TTM（直近12か月）"
          in: query
          name: period
          schema:
            type: string
        - description: "財務レポートの種別。対応値: TTM（直近12か月）, A（当初報告値）, R（修正再表示値）, P（速報発表）"
          in: query
          name: reportType
          schema:
            type: string
      responses:
        "200":
          description: 決算レポートデータ
          content:
            application/json:
              schema:
                type: object
        "400":
          description: 不正なリクエスト - symbols パラメータが指定されていないか無効です
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: 内部サーバーエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
      security:
        - ApiKeyAuth: []
      summary: 四半期および年次の業績レポート V2.1
      tags:
        - Fundamentals
  /api/v2.1/fundamentals/financials:
    get:
      description: 指定したシンボルの財務諸表を取得します。貸借対照表、損益計算書、キャッシュフロー計算書のデータが含まれます。
