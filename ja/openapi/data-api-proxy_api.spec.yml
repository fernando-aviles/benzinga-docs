          required: true
          schema:
            type: string
        - description: "このdate以降の日付で結果を絞り込みます。形式: YYYY-MM-DD（例: 2024-01-01）"
          in: query
          name: asOf
          schema:
            type: string
        - description: "財務報告期間のフィルター。対応値: Q1、Q2、Q3、Q4（四半期）、FY（会計年度）、TTM（直近12か月）"
          in: query
          name: period
          schema:
            type: string
        - description: "財務レポートの種別。対応値: TTM（直近12か月）、A（当初報告）、R（修正値）、P（速報）"
          in: query
          name: reportType
          schema:
            type: string
      responses:
        "200":
          description: 企業財務データ
          content:
            application/json:
              schema:
                type: object
        "400":
          description: 不正なリクエスト - symbolsパラメータが不足しているか無効です
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: 内部サーバーエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
      security:
        - ApiKeyAuth: []
      summary: 企業財務データ V2.1
      tags:
        - Fundamentals
  /api/v2.1/fundamentals/companyProfile:
    get:
      description: 事業内容、業種分類、セクターの詳細、本社所在地、主要役員、その他の企業メタデータを含む包括的な企業プロフィール情報を取得します。企業の背景や組織構造を把握するうえで重要です。
      operationId: get-company-profile-v21
      parameters:
