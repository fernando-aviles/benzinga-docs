        - Fundamentals
  /api/v2.1/fundamentals/operationRatios:
    get:
      description: シンボルのリストに対する業績関連比率を取得します。営業利益率、利益率、ROA、ROE、その他の指標が含まれます。
      operationId: get-operation-ratios-v21
