  /api/v2.1/fundamentals/shareClass:
    get:
      description: 指定したsymbolsの株式クラス情報を取得します。株式クラスID、通貨、そのほかの関連メタデータを含む詳細な株式構造データを返します。
      parameters:
        - description: "カンマ区切りのsymbolsリスト（例: AAPL, MSFT）"
          in: query
          name: symbols
          required: true
          schema:
            type: string
        - description: このパラメータで指定したdate（YYYY-MM-DD）以降の結果を返します
