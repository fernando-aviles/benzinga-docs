          description: Datos de informes de resultados
          content:
            application/json:
              schema:
                type: object
        "400":
          description: "Solicitud incorrecta: falta el parámetro symbols o no es válido"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
