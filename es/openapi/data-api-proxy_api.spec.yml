      summary: Información del perfil de la empresa V2.1
      tags:
        - Fundamentals
  /api/v2.1/fundamentals/earningRatios:
    get:
      description: Recupera ratios de beneficios para una lista de símbolos. Incluye
        métricas como la relación P/E, EPS y otros ratios relacionados con los
