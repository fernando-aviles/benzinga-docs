openapi: 3.0.0
info:
  contact: {}
  description: Esta API REST proporciona endpoints para buscar datos fundamentales
    y obtener sus detalles.
  termsOfService: http://swagger.io/terms/
  title: Data API Proxy
  version: 2.0.0
paths:
  /api/v1/market/movers:
    get:
      description: Recupera datos de movimientos del mercado según los filtros
        especificados. Devuelve acciones que han registrado movimientos
        significativos durante la sesión y el intervalo de tiempo especificados.
        Admite consultas personalizadas de screener y movers para un filtrado
        avanzado.
      operationId: get-movers
      parameters:
        - description: Número máximo de resultados que se devolverán. Controla el tamaño
            de la respuesta.
          in: query
          name: maxResults
          schema:
            type: integer
        - description: "Fecha/hora de inicio de los datos de movers. Formato: YYYY-MM-DD o
            YYYY-MM-DDTHH:MM:SS"
          in: query
          name: from
          schema:
            type: string
        - description: "Fecha/hora de fin de los datos de movers. Formato: YYYY-MM-DD o
            YYYY-MM-DDTHH:MM:SS"
          in: query
          name: to
          schema:
            type: string
        - description: "Sesión de trading para filtrar movers. Ejemplos: PRE_MARKET,
            REGULAR, AFTER_MARKET"
          in: query
          name: session
          schema:
            type: string
        - description: Cadena de consulta personalizada del screener para filtrar valores
            según criterios específicos
          in: query
          name: screenerQuery
          schema:
            type: string
        - description: Cadena de consulta personalizada para movers que define patrones de
            movimiento o umbrales específicos
          in: query
          name: moversQuery
          schema:
            type: string
      responses:
        "200":
          description: Datos de movers del mercado
          content:
            application/json:
              schema:
                type: object
        "400":
          description: "Solicitud incorrecta: parámetros no válidos"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                type: object
      security:
        - ApiKeyAuth: []
      summary: Movimientos del mercado
      tags:
        - Market Data
  /api/v1/quoteDelayed:
    get:
      description: Obtener cotizaciones diferidas para una lista de symbols, ISIN o CIK
      operationId: get-quote-delayed-v1
      parameters:
        - description: Lista de ticker separada por comas. Se requiere al menos uno de
            symbols, isin o cik.
          in: query
          name: symbols
          schema:
            type: string
        - description: "Lista de identificadores ISIN separada por comas. Máximo: 50. Se
            requiere al menos uno de symbols, isin o cik."
          in: query
          name: isin
          schema:
            type: string
        - description: Lista de identificadores CIK separada por comas. Se requiere al
            menos uno de symbols, isin o cik.
          in: query
          name: cik
          schema:
            type: string
      responses:
        "200":
          description: Devuelve un objeto JSON con cotizaciones diferidas
          content:
            application/json:
              schema:
                type: string
        "400":
          description: Solicitud incorrecta
          content:
            application/json:
              schema:
                type: string
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                type: string
      security:
        - ApiKeyAuth: []
      summary: Obtener cotizaciones con retraso V1
      tags:
        - QuoteDelayed
  /api/v1/shortinterest:
    get:
      description: Recupera datos de posiciones cortas para los valores especificados.
        Incluye información sobre acciones vendidas en corto, días para cubrir y
        ratios de posiciones cortas. Admite datos opcionales de informes de
        FINRA y filtrado por rango de fechas.
      operationId: get-short-interest
      parameters:
        - description: Lista de ticker separada por comas (p. ej., AAPL,MSFT,TSLA).
            Obligatorio.
          in: query
          name: symbols
          required: true
          schema:
            type: string
        - description: "Incluir datos del informe de posiciones cortas de FINRA.
            Predeterminado: false"
          in: query
          name: finraReport
          schema:
            type: boolean
        - description: Número de página para la paginación. Se usa con el parámetro
            pageSize.
          in: query
          name: page
          schema:
            type: integer
        - description: Número de resultados por página. El valor predeterminado varía
            según la configuración del endpoint.
          in: query
          name: pageSize
          schema:
            type: integer
        - description: "Fecha de inicio para los datos de posiciones cortas. Formato:
            YYYY-MM-DD"
          in: query
          name: from
          schema:
            type: string
        - description: "Fecha de fin para los datos de posiciones cortas. Formato:
            YYYY-MM-DD"
          in: query
          name: to
          schema:
            type: string
      responses:
        "200":
          description: Datos de posiciones cortas para los symbols solicitados
          content:
            application/json:
              schema:
                type: object
        "400":
          description: "Solicitud incorrecta: falta el parámetro symbols o no es válido"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                type: object
      security:
        - ApiKeyAuth: []
      summary: Datos de posiciones cortas
      tags:
        - Market Data
  /api/v2.1/fundamentals:
    get:
      description: Recupera datos mejorados de Fundamentales financieros para los
        valores especificados. Esta es una versión mejorada del endpoint V2 con
        campos de datos adicionales y mejor rendimiento. Devuelve métricas
        financieras completas, ratios e información de company a partir de
        fuentes de datos actualizadas.
      operationId: get-fundamentals-v21
      parameters:
        - description: Lista de ticker separada por comas (p. ej., AAPL,MSFT,GOOGL).
            Obligatorio.
          in: query
          name: symbols
          required: true
          schema:
            type: string
        - description: "Filtra los resultados para fechas iguales o posteriores a esta
            fecha. Formato: YYYY-MM-DD (p. ej., 2024-01-01)"
          in: query
          name: asOf
          schema:
            type: string
        - description: "Filtro de period para períodos de informes financieros. Valores
            admitidos: Q1 (primer trimestre), Q2 (segundo trimestre), Q3 (tercer
            trimestre), Q4 (cuarto trimestre), FY (año fiscal), TTM (últimos
            doce meses)"
          in: query
          name: period
          schema:
            type: string
        - description: "Tipo de informe financiero que se va a recuperar. Valores
            admitidos: TTM (últimos doce meses), A (según se informó
            originalmente), R (valores reexpresados), P (anuncios preliminares)"
          in: query
          name: reportType
          schema:
            type: string
      responses:
        "200":
          description: Datos de Fundamentales mejorados con métricas y ratios adicionales
          content:
            application/json:
              schema:
                type: object
        "400":
          description: "Solicitud incorrecta: falta el parámetro symbols o no es válido"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
      security:
        - ApiKeyAuth: []
      summary: Fundamentales de la empresa V2.1
      tags:
        - Fundamentals
  /api/v2.1/fundamentals/alphaBeta:
    get:
      description: Recupera métricas Alpha y Beta para los symbols especificados.
        Estas métricas indican la volatilidad y el rendimiento en relación con
        el mercado.
      operationId: get-alpha-beta-v21
      parameters:
        - description: Lista de symbols separados por comas (p. ej., AAPL, MSFT)
          in: query
          name: symbols
          required: true
          schema:
            type: string
        - description: Devuelve resultados para fechas iguales o posteriores a la date
            especificada en este parámetro (YYYY-MM-DD)
          in: query
          name: asOf
          schema:
            type: string
        - description: Especifica el período de tiempo de los resultados devueltos (p.
            ej., Q1, 2023)
          in: query
          name: period
          schema:
            type: string
        - description: "Tipo de informe: TTM (últimos doce meses), A (según se informó
            originalmente), R (reexpresado), P (preliminar)"
          in: query
          name: reportType
          schema:
            type: string
      responses:
        "200":
          description: Datos alfa-beta
          content:
            application/json:
              schema:
                type: string
        "400":
          description: Solicitud incorrecta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
      security:
        - ApiKeyAuth: []
      summary: Obtener alfa y beta V2.1
      tags:
        - Fundamentals
  /api/v2.1/fundamentals/assetClassification:
    get:
      description: Recupera detalles de clasificación de activos para los símbolos
        especificados, incluidos el sector, la industria y otros metadatos de
        clasificación. Útil para la categorización y el análisis de carteras.
      operationId: get-asset-classification-v21
      parameters:
        - description: Lista de símbolos separados por comas (p. ej., AAPL, MSFT)
          in: query
          name: symbols
          required: true
          schema:
            type: string
        - description: Devuelve resultados para fechas iguales o posteriores a la fecha
            especificada en este parámetro (YYYY-MM-DD)
          in: query
          name: asOf
          schema:
            type: string
        - description: Especifica el período de tiempo de los resultados devueltos (p.
            ej., Q1, 2023)
          in: query
          name: period
          schema:
            type: string
        - description: "Tipo de informe: TTM (últimos doce meses), A (según se informó
            originalmente), R (reexpresado), P (preliminar)"
          in: query
          name: reportType
          schema:
            type: string
      responses:
        "200":
          description: Datos de clasificación de activos
          content:
            application/json:
              schema:
                type: string
        "400":
          description: Solicitud incorrecta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
      security:
        - ApiKeyAuth: []
      summary: Obtener clasificación de activos V2.1
      tags:
        - Fundamentals
  /api/v2.1/fundamentals/company:
    get:
      description: Recupera datos financieros detallados específicos de la empresa,
        incluidas métricas clave, estadísticas operativas y rendimiento
        financiero histórico. Proporciona una visión integral de las finanzas de
        la empresa más allá de los Fundamentales básicos.
      operationId: get-company-v21
      parameters:
        - description: Lista de ticker separados por comas (p. ej., AAPL,MSFT,GOOGL).
            Obligatorio.
          in: query
          name: symbols
          required: true
          schema:
            type: string
        - description: "Filtra los resultados para fechas en esta fecha o posteriores.
            Formato: YYYY-MM-DD (p. ej., 2024-01-01)"
          in: query
          name: asOf
          schema:
            type: string
        - description: "Filtro de período para períodos de informes financieros. Valores
            admitidos: Q1, Q2, Q3, Q4 (trimestres), FY (año fiscal), TTM
            (últimos doce meses)"
          in: query
          name: period
          schema:
            type: string
        - description: "Tipo de informe financiero. Valores admitidos: TTM (últimos doce
            meses), A (según se informó originalmente), R (valores
            reexpresados), P (anuncios preliminares)"
          in: query
          name: reportType
          schema:
            type: string
      responses:
        "200":
          description: Datos financieros de la empresa
          content:
            application/json:
              schema:
                type: object
        "400":
          description: "Solicitud incorrecta: falta el parámetro symbols o no es válido"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
      security:
        - ApiKeyAuth: []
      summary: Datos financieros de la empresa V2.1
      tags:
        - Fundamentals
  /api/v2.1/fundamentals/companyProfile:
    get:
      description: Recupera información integral del perfil de la empresa, incluida la
        descripción del negocio, la clasificación de la industria, los detalles
        del sector, la ubicación de la sede, los ejecutivos clave y otros
        metadatos corporativos. Esencial para comprender los antecedentes de la
        empresa y su estructura organizativa.
      operationId: get-company-profile-v21
      parameters:
        - description: Lista de ticker separados por comas (p. ej., AAPL,MSFT,GOOGL).
            Obligatorio.
          in: query
          name: symbols
          required: true
          schema:
            type: string
        - description: "Filtra los resultados para fechas en esta fecha o posteriores.
            Formato: YYYY-MM-DD (p. ej., 2024-01-01)"
          in: query
          name: asOf
          schema:
            type: string
        - description: "Filtro de período para períodos de informes financieros. Valores
            admitidos: Q1, Q2, Q3, Q4 (trimestres), FY (año fiscal), TTM
            (últimos doce meses)"
          in: query
          name: period
          schema:
            type: string
        - description: "Tipo de informe financiero. Valores admitidos: TTM (últimos doce
            meses), A (según se informó originalmente), R (valores
            reexpresados), P (anuncios preliminares)"
          in: query
          name: reportType
          schema:
            type: string
      responses:
        "200":
          description: Datos del perfil de la empresa
          content:
            application/json:
              schema:
                type: object
        "400":
          description: "Solicitud incorrecta: falta el parámetro symbols o no es válido"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
      security:
        - ApiKeyAuth: []
      summary: Información del perfil de la empresa V2.1
      tags:
        - Fundamentals
  /api/v2.1/fundamentals/earningRatios:
    get:
      description: Recupera ratios de ganancias para una lista de símbolos. Incluye
        métricas como el PER, el EPS y otros ratios relacionados con las
        ganancias.
      operationId: get-earning-ratios-v21
      parameters:
        - description: Lista de símbolos separados por comas (p. ej., AAPL, MSFT)
          in: query
          name: symbols
          required: true
          schema:
            type: string
        - description: Devuelve resultados para fechas posteriores o iguales a la
            especificada en este parámetro (YYYY-MM-DD)
          in: query
          name: asOf
          schema:
            type: string
        - description: Especifica el período de tiempo de los resultados devueltos (p.
            ej., Q1, 2023)
          in: query
          name: period
          schema:
            type: string
        - description: "Tipo de informe: TTM (últimos doce meses), A (según lo informado
            originalmente), R (reexpresado), P (preliminar)"
          in: query
          name: reportType
          schema:
            type: string
      responses:
        "200":
          description: Datos de ratios de ganancias
          content:
            application/json:
              schema:
                type: string
        "400":
          description: Solicitud incorrecta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
      security:
        - ApiKeyAuth: []
      summary: Obtener ratios de rentabilidad V2.1
      tags:
        - Fundamentals
  /api/v2.1/fundamentals/earningReports:
    get:
      description: Recupera informes detallados de ganancias para los valores
        especificados, incluidos los ingresos, las ganancias por acción (EPS),
        el EBITDA, los ingresos netos y otros resultados financieros clave de
        informes trimestrales y anuales. Esencial para analizar el rendimiento
        financiero de la empresa y las tendencias de ganancias a lo largo del
        tiempo.
      operationId: get-earnings-reports-v21
      parameters:
        - description: Lista separada por comas de ticker de acciones (p. ej.,
            AAPL,MSFT,GOOGL). Obligatorio.
          in: query
          name: symbols
          required: true
          schema:
            type: string
        - description: "Filtra resultados para fechas iguales o posteriores a esta fecha.
            Formato: YYYY-MM-DD (p. ej., 2024-01-01)"
          in: query
          name: asOf
          schema:
            type: string
        - description: "Filtro de período para los períodos de informes financieros.
            Valores admitidos: Q1, Q2, Q3, Q4 (trimestres), FY (año fiscal), TTM
            (últimos doce meses)"
          in: query
          name: period
          schema:
            type: string
        - description: "Tipo de informe financiero. Valores admitidos: TTM (últimos doce
            meses), A (según lo informado originalmente), R (valores
            reexpresados), P (anuncios preliminares)"
          in: query
          name: reportType
          schema:
            type: string
      responses:
        "200":
          description: Datos de informes de ganancias
          content:
            application/json:
              schema:
                type: object
        "400":
          description: "Solicitud incorrecta: falta el parámetro symbols o no es válido"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
      security:
        - ApiKeyAuth: []
      summary: Informes trimestrales y anuales de resultados V2.1
      tags:
        - Fundamentals
  /api/v2.1/fundamentals/financials:
    get:
      description: Recupera estados financieros para los símbolos especificados.
        Incluye datos de balances, estados de resultados y estados de flujo de
        efectivo.
      parameters:
        - description: Lista de símbolos separados por comas (p. ej., AAPL, MSFT)
          in: query
          name: symbols
          required: true
          schema:
            type: string
        - description: Devuelve resultados para fechas posteriores o iguales a la
            especificada en este parámetro (YYYY-MM-DD)
          in: query
          name: asOf
          schema:
            type: string
        - description: Especifica el período de tiempo de los resultados devueltos (p.
            ej., Q1, 2023)
          in: query
          name: period
          schema:
            type: string
        - description: "Tipo de informe: TTM (últimos doce meses), A (según lo informado
            originalmente), R (reexpresado), P (preliminar)"
          in: query
          name: reportType
          schema:
            type: string
      responses:
        "200":
          description: Datos de estados financieros
          content:
            application/json:
              schema:
                items:
                  type: string
                type: array
        "400":
          description: Solicitud incorrecta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
      security:
        - ApiKeyAuth: []
      summary: Obtener datos financieros V2.1
      tags:
        - Fundamentals
  /api/v2.1/fundamentals/operationRatios:
    get:
      description: Recupera ratios operativos para una lista de símbolos. Incluye
        métricas como el margen operativo, el margen de beneficio, el ROA, el
        ROE y otras.
      operationId: get-operation-ratios-v21
      parameters:
        - description: Lista de símbolos separados por comas (p. ej., AAPL, MSFT)
          in: query
          name: symbols
          required: true
          schema:
            type: string
        - description: Devuelve resultados para fechas posteriores o iguales a la
