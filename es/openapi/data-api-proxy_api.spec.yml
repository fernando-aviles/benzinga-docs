          in: query
          name: symbols
          required: true
          schema:
            type: string
        - description: Devuelve resultados para fechas iguales o posteriores a la date
            especificada en este parámetro (YYYY-MM-DD)
          in: query
          name: asOf
          schema:
            type: string
        - description: Especifica el period de los resultados devueltos (p. ej., Q1, 2023)
          in: query
          name: period
          schema:
            type: string
        - description: "Tipo de informe: TTM (últimos doce meses), A (según lo informado
            originalmente), R (reexpresado), P (preliminar)"
          in: query
          name: reportType
          schema:
            type: string
      responses:
        "200":
          description: Datos de clases de acciones
          content:
            application/json:
              schema:
                type: string
        "400":
          description: Solicitud incorrecta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
      security:
        - ApiKeyAuth: []
      summary: Obtener clase de acciones V2.1
      tags:
        - Fundamentals
  /api/v2.1/fundamentals/shareClassProfile:
    get:
      description: Recupera información de perfil de clases de acciones y proporciona
        detalles sobre las características de la clase de acciones y los
        metadatos asociados.
      parameters:
        - description: Lista de symbols separados por comas (p. ej., AAPL, MSFT)
          in: query
          name: symbols
          required: true
          schema:
