          schema:
            type: string
      responses:
        "200":
          description: Datos de ratios operativos
          content:
            application/json:
              schema:
                type: string
        "400":
          description: Solicitud incorrecta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
      security:
        - ApiKeyAuth: []
      summary: Obtener ratios operativos V2.1
      tags:
        - Fundamentals
  /api/v2.1/fundamentals/shareClass:
    get:
      description: Recupera información sobre clases de acciones para symbols
        específicos. Devuelve datos detallados de la estructura accionaria,
        incluidos los ID de las clases de acciones, la moneda y otros metadatos
        relacionados.
      parameters:
