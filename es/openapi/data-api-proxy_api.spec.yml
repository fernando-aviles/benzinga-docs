  /api/v2.1/fundamentals/earningReports:
    get:
      description: Recupera informes de resultados detallados para los valores
        especificados, incluidos ingresos, ganancias por acción (EPS), EBITDA,
        beneficio neto y otros resultados financieros clave de informes
        trimestrales y anuales. Es esencial para analizar el rendimiento
        financiero de la empresa y las tendencias de beneficios a lo largo del
        tiempo.
      operationId: get-earnings-reports-v21
      parameters:
        - description: Lista separada por comas de símbolos de tíker de acciones (p. ej.,
            AAPL,MSFT,GOOGL). Obligatorio.
          in: query
          name: symbols
          required: true
          schema:
            type: string
        - description: "Filtra los resultados para fechas iguales o posteriores a esta
