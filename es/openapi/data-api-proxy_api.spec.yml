openapi: 3.0.0
info:
  contact: {}
  description: Esta API REST proporciona puntos finales para buscar fundamentales
    y obtener detalles sobre ellos.
  termsOfService: http://swagger.io/terms/
  title: Data API Proxy
  version: 2.0.0
paths:
  /api/v1/market/movers:
    get:
      description: Recupera datos de valores con mayores movimientos según los filtros
        especificados. Devuelve acciones que se han movido de forma
        significativa durante la sesión y el intervalo de tiempo especificados.
        Admite consultas personalizadas de screener y movers para un filtrado
        avanzado.
      operationId: get-movers
      parameters:
        - description: Número máximo de resultados que se devolverán. Controla el tamaño
            de la respuesta.
          in: query
          name: maxResults
          schema:
            type: integer
        - description: "Fecha/hora de inicio para los datos de valores con mayores
            movimientos. Formato: YYYY-MM-DD o YYYY-MM-DDTHH:MM:SS"
          in: query
          name: from
          schema:
            type: string
        - description: "Fecha/hora de fin para los datos de valores con mayores
            movimientos. Formato: YYYY-MM-DD o YYYY-MM-DDTHH:MM:SS"
          in: query
          name: to
          schema:
            type: string
        - description: "Sesión de negociación para filtrar los valores con mayores
            movimientos. Ejemplos: PRE_MARKET, REGULAR, AFTER_MARKET"
          in: query
          name: session
          schema:
            type: string
        - description: Cadena de consulta personalizada del screener para filtrar valores
            según criterios específicos
          in: query
          name: screenerQuery
          schema:
            type: string
        - description: Cadena de consulta personalizada para definir patrones o umbrales
            de movimiento específicos
          in: query
          name: moversQuery
          schema:
            type: string
      responses:
        "200":
          description: Datos de movimientos del mercado
          content:
            application/json:
              schema:
                type: object
        "400":
          description: "Solicitud incorrecta: parámetros no válidos"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                type: object
      security:
        - ApiKeyAuth: []
      summary: Valores con mayores movimientos
      tags:
        - Market Data
  /api/v1/quoteDelayed:
    get:
      description: Obtiene cotizaciones con retraso para una lista de símbolos, ISIN o CIK
      operationId: get-quote-delayed-v1
      parameters:
        - description: Lista de tíkeres de acciones separada por comas. Se requiere al
            menos uno de symbols, isin o cik.
          in: query
          name: symbols
          schema:
            type: string
        - description: Lista de identificadores ISIN separados por comas. Máximo 50. Se
            requiere al menos uno de symbols, isin o cik.
          in: query
          name: isin
          schema:
            type: string
        - description: Lista de identificadores CIK separados por comas. Se requiere al
            menos uno de symbols, isin o cik.
          in: query
          name: cik
          schema:
            type: string
      responses:
        "200":
          description: Devuelve un objeto JSON con cotizaciones con retraso
          content:
            application/json:
              schema:
                type: string
        "400":
          description: Solicitud incorrecta
          content:
            application/json:
              schema:
                type: string
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                type: string
      security:
        - ApiKeyAuth: []
      summary: Obtener cotizaciones con retraso V1
      tags:
        - QuoteDelayed
  /api/v1/shortinterest:
    get:
      description: Recupera datos de interés en corto para los valores especificados.
        Incluye información sobre acciones vendidas en corto, días para cubrir y
        ratios de interés en corto. Admite datos opcionales de informes de FINRA
        y filtrado por rango de fechas.
      operationId: get-short-interest
      parameters:
        - description: Lista de tíkeres de acciones separada por comas (p. ej.,
            AAPL,MSFT,TSLA). Obligatorio.
          in: query
          name: symbols
          required: true
          schema:
            type: string
        - description: "Incluye datos del informe de interés en corto de FINRA. Valor
            predeterminado: false"
          in: query
          name: finraReport
          schema:
            type: boolean
        - description: Número de página para la paginación. Se usa con el parámetro
            pageSize.
          in: query
          name: page
          schema:
            type: integer
        - description: Número de resultados por página. El valor predeterminado varía
            según la configuración del punto final.
          in: query
          name: pageSize
          schema:
            type: integer
        - description: "Fecha de inicio para los datos de interés en corto. Formato:
            YYYY-MM-DD"
          in: query
          name: from
          schema:
            type: string
        - description: "Fecha de fin para los datos de interés en corto. Formato:
            YYYY-MM-DD"
          in: query
          name: to
          schema:
            type: string
      responses:
        "200":
          description: Datos de interés en corto para los símbolos solicitados
          content:
            application/json:
              schema:
                type: object
        "400":
          description: "Solicitud incorrecta: falta el parámetro symbols o no es válido"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                type: object
      security:
        - ApiKeyAuth: []
      summary: Datos de posiciones cortas
      tags:
        - Market Data
  /api/v2.1/fundamentals:
    get:
      description: Recupera datos mejorados de fundamentales financieros para los
        valores especificados. Esta es una versión mejorada del punto final v2
        con campos de datos adicionales y mejor rendimiento. Devuelve métricas
        financieras completas, ratios e información de la empresa a partir de
        fuentes de datos actualizadas.
      operationId: get-fundamentals-v21
      parameters:
        - description: Lista de tíkeres de acciones separada por comas (p. ej.,
            AAPL,MSFT,GOOGL). Obligatorio.
          in: query
          name: symbols
          required: true
          schema:
            type: string
        - description: "Filtra los resultados para fechas iguales o posteriores a esta
            fecha. Formato: YYYY-MM-DD (p. ej., 2024-01-01)"
          in: query
          name: asOf
          schema:
            type: string
        - description: "Filtro de período para los períodos de reporte financiero. Valores
            admitidos: Q1 (primer trimestre), Q2 (segundo trimestre), Q3 (tercer
            trimestre), Q4 (cuarto trimestre), FY (año fiscal), TTM (últimos
            doce meses)"
          in: query
          name: period
          schema:
            type: string
        - description: "Tipo de informe financiero que se va a recuperar. Valores
            admitidos: TTM (últimos doce meses), A (según lo informado
            originalmente), R (valores reexpresados), P (anuncios preliminares)"
          in: query
          name: reportType
          schema:
            type: string
      responses:
        "200":
          description: Datos mejorados de fundamentales con métricas y ratios adicionales
          content:
            application/json:
              schema:
                type: object
        "400":
          description: "Solicitud incorrecta: falta el parámetro symbols o no es válido"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
      security:
        - ApiKeyAuth: []
      summary: Fundamentales de la empresa V2.1
      tags:
        - Fundamentals
  /api/v2.1/fundamentals/alphaBeta:
    get:
      description: Recupera métricas Alpha y Beta para los símbolos especificados.
        Estas métricas indican la volatilidad y el rendimiento en relación con
        el mercado.
      operationId: get-alpha-beta-v21
      parameters:
        - description: Lista de símbolos separados por comas (p. ej., AAPL, MSFT)
          in: query
          name: symbols
          required: true
          schema:
            type: string
        - description: Devuelve resultados para fechas mayores o iguales que la fecha
            especificada en este parámetro (YYYY-MM-DD)
          in: query
          name: asOf
          schema:
            type: string
        - description: Especifica el período de los resultados devueltos (p. ej., Q1, 2023)
          in: query
          name: period
          schema:
            type: string
        - description: "Tipo de informe: TTM (últimos doce meses), A (según lo informado
            originalmente), R (reexpresado), P (preliminar)"
          in: query
          name: reportType
          schema:
            type: string
      responses:
        "200":
          description: Datos de alfa beta
          content:
            application/json:
              schema:
                type: string
        "400":
          description: Solicitud incorrecta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
      security:
        - ApiKeyAuth: []
      summary: Obtener alfa y beta V2.1
      tags:
        - Fundamentals
  /api/v2.1/fundamentals/assetClassification:
    get:
      description: Recupera detalles de clasificación de activos para los symbols
        especificados, incluidos el sector, la industria y otros metadatos de
