      description: Recupera datos históricos de barras de precios OHLCV (apertura,
        máximo, mínimo, cierre, volumen) para los valores especificados.
        Devuelve datos de precios agregados según el intervalo especificado.
        Admite múltiples ticker y varios rangos de tiempo, incluidas fechas
        relativas.
      operationId: get-bars-v2
      parameters:
        - description: Lista de ticker de acciones separados por comas (p. ej.,
            AAPL,MSFT,TSLA). Obligatorio.
          in: query
          name: symbols
          required: true
          schema:
            type: string
        - description: "Fecha/hora de inicio de las barras. Formatos: YYYY-MM-DD,
            YYYY-MM-DDTHH:MM:SS, YTD (año hasta la fecha) o valores relativos
            como 1MONTH/1m/1M, 1WEEK/1w/1W, 1DAY/1d/1D. Obligatorio."
          in: query
          name: from
          required: true
          schema:
            type: string
        - description: "Fecha/hora de fin de las barras. Formato: YYYY-MM-DD o
            YYYY-MM-DDTHH:MM:SS. Si no se especifica, el valor predeterminado es
            la fecha/hora actual."
          in: query
          name: to
          schema:
            type: string
        - description: "Intervalo temporal para agregar barras de precios. Valores
            admitidos: 1m (1 minuto), 5m (5 minutos), 15m (15 minutos), 30m (30
            minutos), 1h (1 hora), 1d (1 día), 1w (1 semana), 1M (1 mes). Valor
            predeterminado: 1d"
          in: query
          name: interval
          schema:
            type: string
        - description: "Filtro de sesión de negociación. Valores admitidos: ANY (todas las
            sesiones), PRE_MARKET (negociación antes de la apertura), REGULAR
