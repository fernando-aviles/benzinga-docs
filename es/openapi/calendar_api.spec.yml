openapi: 3.0.0
info:
  contact: {}
  description: Autenticación mediante token Bearer
  title: Newsfeed & Why is it Moving v2
  version: 2.0.0
paths:
  /api/v2.1/news/channels:
    get:
      description: Devuelve una lista de todos los canales de Noticias disponibles que
        pueden usarse para filtrar noticias. Los canales pueden tener
        subcanales, pero todos aparecerán como elementos independientes.
      operationId: get-channels
      responses:
        "200":
          description: éxito
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
      summary: Obtener los canales de noticias disponibles
      tags:
        - Channels
  /api/v2/news:
    get:
      description: Esta API REST devuelve datos estructurados de noticias. Para
        obtener un rendimiento óptimo, limite el alcance de la consulta mediante
        parámetros como tickers, date y channels, o use updatedSince para
        obtener deltas. Los desplazamientos de página están limitados de 0 a
        100000.
      operationId: get-news
      parameters:
        - description: Especifique el formato de salida
          in: header
          name: accept
          required: true
          schema:
            type: string
            enum:
              - application/json
              - application/xml
            default: application/json
        - description: Desplazamiento de página. Por motivos de optimización, rendimiento
            y razones técnicas, los desplazamientos de página están limitados de
            0 a 100000. Limite los resultados de la consulta mediante otros
            parámetros, como date.
          in: query
          name: page
          schema:
            type: integer
            default: 0
        - description: "Número de resultados devueltos. Máximo: 100."
          in: query
          name: pageSize
          schema:
            type: integer
            maximum: 100
            default: 15
        - description: Especifique si desea solo el titular (headline), titular + resumen
            (abstract) o titular + texto completo (full)
          in: query
          name: displayOutput
          schema:
            type: string
            enum:
              - full
              - abstract
              - headline
            default: headline
        - description: "La fecha para consultar noticias. Forma abreviada de dateFrom y
            dateTo si ambas son la misma. Formato: yyyy-mm-dd"
          in: query
          name: date
          schema:
            type: string
        - description: "Fecha desde la que realizar la consulta. Ordenado por fecha de
            publicación. Formato: yyyy-mm-dd"
          in: query
          name: dateFrom
          schema:
            type: string
        - description: "Fecha hasta la que realizar la consulta. Ordenado por fecha de
            publicación. Formato: yyyy-mm-dd"
          in: query
          name: dateTo
          schema:
            type: string
        - description: La marca de tiempo Unix (UTC) de la última actualización para
            extraer y ordenar los resultados
          in: query
          name: updatedSince
          schema:
            type: integer
        - description: La marca de tiempo Unix (UTC) de la última publicación para extraer
            y ordenar los resultados
          in: query
          name: publishedSince
          schema:
            type: integer
        - description: "Permite controlar el orden de los resultados. El valor
            predeterminado es created, DESC. Formato: campo:dirección. Campos de
            ordenación: id, created, updated. Orden de clasificación: asc
            (ascendente), desc (descendente)"
          in: query
          name: sort
          schema:
            type: string
            enum:
              - id:asc
              - id:desc
              - created:asc
              - created:desc
              - updated:asc
              - updated:desc
        - description: "Uno o más ISIN separados por comas. Máximo: 50. Formato: csv"
          in: query
          name: isin
          schema:
            type: string
        - description: "Uno o más CUSIP separados por comas. Máximo: 50. Se requiere un
            acuerdo de licencia. Formato: csv"
          in: query
          name: cusips
          schema:
            type: string
        - description: "Uno o más tickers separados por comas. Máximo: 50. Formato: csv"
          in: query
          name: tickers
          schema:
            type: string
        - description: "Uno o más tickers principales separados por comas. Filtra solo por
            la asociación con el ticker principal. Formato: csv"
          in: query
          name: primaryTickers
          schema:
            type: string
        - description: "Uno o más nombres de canal o ID separados por comas. Formato: csv"
          in: query
          name: channels
          schema:
            type: string
        - description: "Una o más palabras o frases separadas por comas; busca en Title,
            Tags y Body en orden de prioridad. Formato: csv"
          in: query
          name: topics
          schema:
            type: string
        - description: Operador lógico para la consulta de temas. Use 'and' para exigir
            todos los temas y 'or' para exigir cualquiera de ellos
          in: query
          name: topic_group_by
          schema:
            type: string
            enum:
              - and
              - or
            default: or
        - description: "Uno o más autores separados por comas. Formato: csv"
          in: query
          name: authors
          schema:
            type: string
        - description: "Uno o más tipos de contenido separados por comas. Formato: csv"
          in: query
          name: content_types
          schema:
            type: string
        - description: Especifique el formato deseado para la respuesta de la API
          in: query
          name: format
          schema:
            type: string
            enum:
              - text
        - description: Filtrar por nivel de importancia
          in: query
          name: importance
          schema:
            type: string
        - description: Filtrar por región (p. ej., 'ca' o 'canada' para contenido
            canadiense)
          in: query
          name: region
          schema:
            type: string
      responses:
        "200":
          description: éxito
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/api.NewsItem"
                type: array
            text/xml:
              schema:
                items:
                  $ref: "#/components/schemas/api.NewsItem"
                type: array
        "400":
          description: Parámetros de consulta no válidos o ausentes
          content:
            application/json:
              schema:
                type: string
            text/xml:
              schema:
                type: string
        "499":
          description: Contexto de la solicitud cancelado
          content:
            application/json:
              schema:
                type: string
            text/xml:
              schema:
                type: string
        "500":
          description: Error interno
          content:
            application/json:
              schema:
                type: string
            text/xml:
              schema:
                type: string
      security:
        - ApiKeyAuth: []
      summary: Obtener las noticias
      tags:
        - News
  /api/v2/news-removed:
    get:
      description: Devuelve los datos de noticias eliminadas. Filtra los resultados
        para incluir solo los elementos que se hayan actualizado desde la marca
        de tiempo especificada.
      operationId: get-removed-news
      parameters:
        - description: Especifica el formato de salida
          in: header
          name: accept
          required: true
          schema:
            type: string
            enum:
              - application/json
            default: application/json
        - description: Desplazamiento de página. Por motivos de optimización, rendimiento
            y razones técnicas, los desplazamientos de página están limitados
            entre 0 y 100000. Limite los resultados de la consulta mediante
            otros parámetros, como date.
          in: query
          name: page
          schema:
            type: integer
            default: 0
        - description: "Número de resultados devueltos. Máximo: 100."
          in: query
          name: pageSize
          schema:
            type: integer
            maximum: 100
            default: 15
        - description: Filtra los resultados para incluir solo los elementos que se hayan
            actualizado desde la marca de tiempo Unix (UTC) especificada
          in: query
          name: updatedSince
          schema:
            type: integer
      responses:
        "200":
          description: éxito
          content:
            application/json:
              schema:
                additionalProperties:
                  items:
                    $ref: "#/components/schemas/api.NewsRemovedItem"
                  type: array
                type: object
        "400":
          description: Parámetros de consulta no válidos o faltantes
          content:
            application/json:
              schema:
                type: string
        "499":
          description: Contexto de la solicitud cancelado
          content:
            application/json:
              schema:
                type: string
        "500":
          description: Error interno
          content:
            application/json:
              schema:
                type: string
      security:
        - ApiKeyAuth: []
      summary: Devuelve los datos de noticias eliminados
      tags:
        - News
servers:
  - url: //api.benzinga.com/api/v2
components:
  securitySchemes:
    ApiKeyAuth:
      description: Autenticación mediante clave de API. Proporcione su clave de API
        como parámetro de consulta.
      in: query
      name: token
      type: apiKey
  schemas:
    api.ChannelTag:
      description: Nombre del canal o de la etiqueta
      properties:
        name:
          example: Technology
          type: string
      type: object
    api.Image:
      description: Imagen del artículo con tamaño y URL
      properties:
        size:
          example: large
          type: string
        url:
          example: https://cdn.benzinga.com/files/images/story/2024/example.jpg
          type: string
      type: object
    api.NewsItem:
      description: Elemento de artículo de Noticias con todos los metadatos
      properties:
        author:
          example: Benzinga Newsdesk
          type: string
        body:
          type: string
        channels:
          items:
            $ref: "#/components/schemas/api.ChannelTag"
          type: array
        created:
          example: Wed, 17 May 2017 14:20:15 -0400
          type: string
        id:
          example: 123456
          type: integer
        image:
          items:
            $ref: "#/components/schemas/api.Image"
          type: array
        original_id:
          type: integer
        stocks:
          items:
            $ref: "#/components/schemas/api.Stock"
          type: array
        tags:
          items:
            $ref: "#/components/schemas/api.ChannelTag"
          type: array
        teaser:
          type: string
        title:
          example: Apple Announces New iPhone
          type: string
        updated:
          example: Wed, 17 May 2017 14:20:15 -0400
          type: string
        url:
          example: https://www.benzinga.com/news/123456
          type: string
      type: object
    api.NewsRemovedItem:
      description: Artículo de noticias eliminado con ID y marca de tiempo de actualización
      properties:
        id:
          example: 123456
          type: integer
        updated:
          example: Wed, 17 May 2017 14:20:15 -0400
          type: string
      type: object
    api.Stock:
      description: Información de la acción con ticker e identificadores
      properties:
        cusip:
          example: "037833100"
          type: string
        exchange:
          example: NASDAQ
          type: string
        isin:
          example: US0378331005
          type: string
        name:
          example: AAPL
          type: string
      type: object
