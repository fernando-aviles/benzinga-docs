openapi: 3.0.0
info:
  contact: {}
  description: Esta API REST proporciona puntos finales para buscar
    transcripciones de llamadas de resultados y obtener los detalles de una
    transcripción de llamada de resultados.
  termsOfService: http://swagger.io/terms/
  title: Earnings Call Transcripts API
  version: 1.0.0
paths:
  /api/v1/earnings-call-transcripts:
    get:
      description: Recupera transcripciones de llamadas de resultados para las
        empresas o los ID de llamada especificados. Devuelve transcripciones
        completas de llamadas de resultados trimestrales y anuales, incluidas
        sesiones de preguntas y respuestas, identificación de los oradores y
        marcas de tiempo. Use filtros de fecha para recuperar transcripciones de
        períodos de reporte específicos o filtre por símbolos de tíker para
        obtener conversaciones de resultados de empresas concretas.
      operationId: get-earnings-call-transcripts
      parameters:
        - description: Lista de símbolos de tíker bursátiles separados por comas para
            filtrar transcripciones de llamadas de resultados (p. ej.,
            AAPL,MSFT,GOOGL). Devuelve todas las transcripciones de estas
            empresas.
          in: query
          name: tickers
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
        - description: Lista separada por comas de ID de llamada específicos que se van a
            recuperar. Use esto para obtener transcripciones de identificadores
            de llamadas de resultados conocidos. Tiene prioridad sobre el
            filtrado por tíker.
          in: query
          name: call_id
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
        - description: "Número de página para la paginación. Indexado desde cero (0 =
            primera página, 1 = segunda página, etc.). Predeterminado: 0"
          in: query
          name: page
          schema:
            type: integer
        - description: "Número de resultados por página. Predeterminado: 5. Máximo: 1000.
            Use tamaños de página más grandes para la recuperación masiva de
            datos."
          in: query
          name: pagesize
          schema:
            type: integer
        - description: Filtro de fecha de inicio en formato YYYY-MM-DD (p. ej.,
            2024-01-01). Devuelve transcripciones de llamadas de resultados en
            esta fecha o posteriores.
          in: query
          name: date_from
          schema:
            type: string
        - description: Filtro de fecha de fin en formato YYYY-MM-DD (p. ej., 2024-12-31).
            Devuelve transcripciones de llamadas de resultados en esta fecha o
            anteriores.
          in: query
          name: date_to
          schema:
            type: string
      responses:
        "200":
          description: Matriz de resúmenes de transcripciones de llamadas de resultados
            con texto completo y metadatos
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/models.TranscriptSummary"
                type: array
        "400":
          description: "Solicitud incorrecta: parámetros no válidos"
          content:
            application/json:
              schema:
                items:
                  type: string
                type: array
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                items:
                  type: string
                type: array
      security:
        - ApiKeyAuth: []
      summary: Transcripciones de llamadas de resultados
      tags:
        - Earnings Call Transcripts
  /api/v1/earnings-call-transcripts/audio:
    get:
      description: Recupera URL descargables de archivos de audio de grabaciones de
        llamadas de resultados. Devuelve URL firmadas para acceder a grabaciones
        de audio completas de llamadas de resultados trimestrales y anuales. Los
        archivos de audio incluyen presentaciones completas de resultados y
        sesiones de preguntas y respuestas. Las URL tienen una validez limitada
        y están firmadas de forma segura para el acceso autorizado.
      operationId: get-earnings-call-transcript-audio-files
      parameters:
        - description: Lista de símbolos de tíker bursátiles separados por comas para
            filtrar archivos de audio (p. ej., AAPL,MSFT,GOOGL). Devuelve
            archivos de audio de todas las llamadas de resultados de estas
            empresas.
          in: query
          name: tickers
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
        - description: Lista separada por comas de ID de llamada específicos para
            recuperar archivos de audio. Use esto para obtener audio de
            identificadores de llamadas de resultados conocidos.
          in: query
          name: call_id
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
        - description: "Número de página para la paginación. Indexado desde cero (0 =
            primera página, 1 = segunda página, etc.). Predeterminado: 0"
          in: query
          name: page
          schema:
            type: integer
        - description: "Número de resultados por página. Predeterminado: 5. Máximo: 1000"
          in: query
          name: pagesize
          schema:
            type: integer
      responses:
        "200":
          description: Matriz de metadatos de archivos de audio de llamadas de resultados
            con URL de descarga firmadas
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/models.TranscriptSummaryAudio"
                type: array
        "400":
          description: "Solicitud incorrecta: parámetros no válidos"
          content:
            application/json:
              schema:
                items:
                  type: string
                type: array
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                items:
                  type: string
                type: array
      security:
        - ApiKeyAuth: []
      summary: Archivos de audio de llamadas de resultados
      tags:
        - Earnings Call Transcripts
components:
  securitySchemes:
    ApiKeyAuth:
      in: query
      name: token
      type: apiKey
  schemas:
    models.Security:
      properties:
        cik:
          type: string
        company_name:
          type: string
        exchange:
          type: string
        isin:
          type: string
        ticker:
          type: string
      type: object
    models.Summary:
      properties:
        summary:
          type: string
        time:
          type: number
      type: object
    models.TranscriptAudioFile:
      properties:
        file_url:
          type: string
      type: object
    models.TranscriptSummary:
      properties:
        call_id:
          type: string
        created:
          type: integer
        date:
          type: string
        id:
          type: string
        reviewed:
          type: boolean
        security:
          $ref: "#/components/schemas/models.Security"
        start_time:
          type: string
        summaries:
          items:
            $ref: "#/components/schemas/models.Summary"
          type: array
        summary_full:
          type: string
        title:
          type: string
        transcript_full:
          type: string
        transcript_timestamped:
          items:
            $ref: "#/components/schemas/models.TranscriptTimestamp"
          type: array
        updated:
          type: integer
        user_id:
          type: integer
      type: object
    models.TranscriptSummaryAudio:
      properties:
        audio_file:
          $ref: "#/components/schemas/models.TranscriptAudioFile"
        call_id:
          type: string
        created:
          type: integer
        date:
          type: string
        id:
          type: string
        security:
          $ref: "#/components/schemas/models.Security"
        start_time:
          type: string
        updated:
          type: integer
      type: object
    models.TranscriptTimestamp:
      properties:
        time:
          type: number
        transcript:
          type: string
      type: object
servers:
  - url: https://api.benzinga.com/api/v1
    description: V1
