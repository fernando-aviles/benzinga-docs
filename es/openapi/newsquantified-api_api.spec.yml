openapi: 3.0.0
info:
  contact: {}
  description: Esta API REST proporciona endpoints para buscar logotipos y obtener
    sus detalles.
  termsOfService: http://swagger.io/terms/
  title: NewsQuantified API
  version: 2.0.0
paths:
  /api/v2/newsquantified:
    get:
      description: Recupera datos de análisis cuantitativo de noticias con
        puntuaciones de sentimiento, métricas de relevancia e indicadores de
        impacto en el mercado. Devuelve datos estructurados que analizan los
        aspectos cuantitativos de la cobertura de noticias, incluidos la
        polaridad del sentimiento, el recuento de artículos, las puntuaciones de
        tendencia y las métricas específicas por ticker. Utilice este endpoint
        para acceder a análisis de noticias en formato legible por máquina para
        trading algorítmico e investigación cuantitativa.
      operationId: get-newsquantified-data
      parameters:
        - description: "Número de página para la paginación. Indexado desde cero (0 =
            primera página, 1 = segunda página, etc.). Predeterminado: 0"
          in: query
          name: page
          schema:
            type: integer
        - description: "Número de resultados por página. Predeterminado: 1000. Máximo:
            1000. Devuelve primero los datos más recientes."
          in: query
          name: pagesize
          schema:
            type: integer
        - description: Marca de tiempo Unix en segundos (UTC). Devuelve datos de
            newsquantified actualizados después de esta marca de tiempo. Úselo
            para actualizaciones incrementales.
          in: query
          name: updated_since
          schema:
            type: integer
        - description: Lista separada por comas de tickers bursátiles para filtrar los
            resultados (p. ej., AAPL,MSFT,TSLA). Devuelve análisis solo para los
            valores especificados.
          in: query
          name: symbols
          schema:
            type: string
        - description: Fecha única en formato YYYY-MM-DD (p. ej., 2024-12-30). Forma
            abreviada de filtrar cuando date_from y date_to son iguales.
            Devuelve datos para esta fecha específica.
          in: query
          name: date
          schema:
            type: string
        - description: Fecha de inicio en formato YYYY-MM-DD (p. ej., 2024-01-01).
            Devuelve datos a partir de esta fecha. Úselo con date_to para
            consultas por rango de fechas.
          in: query
          name: date_from
          schema:
            type: string
        - description: Fecha de fin en formato YYYY-MM-DD (p. ej., 2024-12-31). Devuelve
            datos hasta esta fecha, inclusive. Úselo con date_from para
            consultas por rango de fechas.
          in: query
          name: date_to
          schema:
            type: string
      responses:
        "200":
          description: Array de análisis cuantitativo de noticias con puntuaciones y
            métricas de sentimiento
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/models.Newsquantified"
                type: array
        "400":
          description: "Solicitud incorrecta: formato de fecha o parámetros no válidos"
          content:
            application/json:
              schema:
                items:
                  type: object
                type: array
        "404":
          description: "No encontrado: no hay datos disponibles para los parámetros
            especificados"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                items:
                  type: object
                type: array
      security:
        - ApiKeyAuth: []
      summary: Análisis cuantitativo de noticias
      tags:
        - News Analytics
components:
  securitySchemes:
    ApiKeyAuth:
      in: header
      name: Authorization
      type: apiKey
  schemas:
    bzhttp.Error:
      properties:
        code:
          $ref: "#/components/schemas/bzhttp.ErrorCode"
        id:
          type: string
        value:
          type: string
      type: object
    bzhttp.ErrorCode:
      enum:
        - unsupported_message_type
        - database_query_error
        - json_unmarshaling_error
        - no_data_found
        - no_matching_endpoint
        - bad_request
        - db_error
        - internal_server_error
        - auth_failed
        - forbidden
        - failed_dependency
        - service_unavailable
        - upstream_api_error
      type: string
      x-enum-varnames:
        - ErrorUnsupportedMessageType
        - ErrorDBQueryError
        - ErrorJSONUnmarshaling
        - ErrorNoDataFound
        - ErrorNoMatchingEndpoint
        - ErrorBadRequest
        - ErrorDBError
        - ErrorInternalServerError
        - ErrorAuthFailed
        - ErrorForbidden
        - ErrorFailedDependency
        - ErrorServiceUnavailable
        - ErrorUpstreamAPIError
    bzhttp.Resp:
      properties:
        data:
          additionalProperties: true
          type: object
        errors:
          items:
