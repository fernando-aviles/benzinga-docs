openapi: 3.0.0
info:
  contact: {}
  description: Esta API REST proporciona endpoints para buscar tickers en
    tendencia y obtener detalles del ticker.
  termsOfService: http://swagger.io/terms/
  title: TickerTrends API
  version: 2.1.0
paths:
  /api/v1/trending-tickers:
    get:
      description: Recupera datos de tendencias para tickers específicos, incluidos el
        rango y la variación. Devuelve puntuaciones de tendencia agregadas y
        niveles de actividad en distintos intervalos de tiempo.
      operationId: get-ticker-trend-data
      parameters:
        - description: "Intervalo de tiempo para agregar los datos de tendencias. Valores
            admitidos: 10m (10 minutos), 1h (1 hora), 1d (1 día). Obligatorio."
          in: query
          name: interval
          required: true
          schema:
            type: string
        - description: Lista de símbolos ticker de acciones separados por comas (p. ej.,
            AAPL,MSFT,TSLA) para los que se recuperarán datos de tendencias.
            Obligatorio.
          in: query
          name: tickers
          required: true
          schema:
            type: string
        - description: "Filtro de fuente de datos para el cálculo de tendencias. Valores
            admitidos: all (todas las fuentes combinadas), clickstream (datos de
            interacción del usuario), logo (datos de solicitudes de logotipos).
            Obligatorio."
          in: query
          name: source
          required: true
          schema:
            type: string
        - description: Ventana temporal para el análisis de tendencias. Especificación
            opcional de un periodo personalizado para filtrar resultados por
            rangos de fechas concretos.
          in: query
          name: timeframe
          schema:
            type: string
        - description: "Número de página para la paginación. Indexado desde cero (0 =
            primera página, 1 = segunda página, etc.). Valor predeterminado: 0"
          in: query
          name: page
          schema:
            type: integer
        - description: "Número de resultados por página. Valor predeterminado: 1000.
            Máximo: 1000"
          in: query
          name: pagesize
          schema:
            type: integer
      responses:
        "200":
          description: Datos de tendencias con métricas de interacción
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpapi.tickerTrendAPIResponse"
        "400":
          description: "Solicitud incorrecta: faltan parámetros obligatorios o no son
            válidos (interval, tickers o source)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpapi.tickerTrendAPIResponse"
      security:
        - ApiKeyAuth: []
      summary: Obtener datos de tendencias de ticker
      tags:
        - Ticker Trends
  /api/v1/trending-tickers/list:
    get:
      description: Recupera una lista de tickers en tendencia según varias métricas.
        Devuelve valores ordenados por puntuación de tendencia en distintos
        intervalos de tiempo.
      operationId: get-ticker-trend-list-data
      parameters:
        - description: Obsoleto. Use timeframe en su lugar. Intervalo de tiempo para
            agregar datos de tendencias.
          in: query
          name: interval
          required: true
          schema:
            type: string
        - description: Lista opcional de símbolos ticker separados por comas para filtrar
            resultados. Si se omite, devuelve todos los tickers en tendencia.
          in: query
          name: tickers
          schema:
            type: string
        - description: "Filtro de fuente de datos para el cálculo de tendencias. Valores
            admitidos: all (todas las fuentes combinadas), clickstream (datos de
            interacción del usuario), logo (datos de solicitudes de logotipos).
            Obligatorio."
          in: query
          name: source
          required: true
          schema:
            type: string
        - description: "Intervalo de tiempo para la agregación de tendencias. Valores
            admitidos: 10m (10 minutos), 1h (1 hora), 1d (1 día). Valor
            predeterminado: 1d"
          in: query
          name: timeframe
          schema:
            type: string
        - description: Filtro de hora de inicio en formato de 24 horas (p. ej., 09:15,
            14:30). Úselo con date_from para rangos horarios precisos.
          in: query
          name: time_from
          schema:
            type: string
        - description: Filtro de hora de finalización en formato de 24 horas (p. ej.,
            16:00, 22:30). Úselo con date_to para rangos horarios precisos.
          in: query
          name: time_to
          schema:
            type: string
        - description: Filtro de fecha de inicio en formato ISO 8601 (p. ej., 2024-12-30,
            2024-01-15). Úselo con time_from para rangos precisos.
          in: query
          name: date_from
          schema:
            type: string
        - description: Filtro de fecha de finalización en formato ISO 8601 (p. ej.,
            2024-12-30, 2024-01-31). Úselo con time_to para rangos precisos.
          in: query
          name: date_to
          schema:
            type: string
        - description: "Número de página para la paginación. Indexado desde cero (0 =
            primera página, 1 = segunda página, etc.). Valor predeterminado: 0"
          in: query
          name: page
          schema:
            type: integer
        - description: "Número de resultados por página. Valor predeterminado: 1000.
            Máximo: 1000"
          in: query
          name: pagesize
          schema:
            type: integer
      responses:
        "200":
          description: Lista clasificada de tickers en tendencia con puntuaciones de
            interacción
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/models.TrendingTickersListAPIResponse"
        "400":
          description: "Solicitud incorrecta: falta el parámetro source o no es válido, o
            el formato de fecha/hora no es válido"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bzhttp.Resp"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/models.TrendingTickersListAPIResponse"
      security:
        - ApiKeyAuth: []
      summary: Obtener la lista de tickers en tendencia
      tags:
        - Ticker Trends
components:
  securitySchemes:
    ApiKeyAuth:
      in: query
      name: token
      type: apiKey
  schemas:
    bzhttp.Error:
      properties:
        code:
          $ref: "#/components/schemas/bzhttp.ErrorCode"
        id:
          type: string
        value:
          type: string
      type: object
    bzhttp.ErrorCode:
      enum:
        - json_unmarshaling_error
        - no_data_found
        - no_matching_endpoint
        - bad_request
        - db_error
        - internal_server_error
        - auth_failed
        - forbidden
        - failed_dependency
        - service_unavailable
        - upstream_api_error
        - unsupported_message_type
        - database_query_error
      type: string
      x-enum-varnames:
        - ErrorJSONUnmarshaling
        - ErrorNoDataFound
        - ErrorNoMatchingEndpoint
        - ErrorBadRequest
        - ErrorDBError
        - ErrorInternalServerError
        - ErrorAuthFailed
        - ErrorForbidden
        - ErrorFailedDependency
        - ErrorServiceUnavailable
        - ErrorUpstreamAPIError
        - ErrorUnsupportedMessageType
        - ErrorDBQueryError
    bzhttp.Resp:
      properties:
        data:
          additionalProperties: true
          type: object
        errors:
          items:
            $ref: "#/components/schemas/bzhttp.Error"
          type: array
        ok:
          type: boolean
      type: object
    httpapi.tickerTrendAPIResponse:
      properties:
        data:
          items:
            $ref: "#/components/schemas/httpapi.tickerTrendData"
          type: array
        ok:
          type: boolean
      type: object
    httpapi.tickerTrendData:
      properties:
        exchange:
          type: string
        metrics:
          items:
            $ref: "#/components/schemas/httpapi.tickerTrendMetrics"
          type: array
        ticker:
          type: string
      type: object
    httpapi.tickerTrendMetrics:
      properties:
        count:
          type: integer
        count_mavg:
          type: number
        market_count_average:
          type: number
        scaled_count:
          type: number
        scaled_count_mavg:
          type: number
        time_bucket:
          type: string
      type: object
    models.Security:
      properties:
        exchange:
          type: string
        name:
          type: string
        ticker:
          type: string
      type: object
    models.TrendingTickersListAPIResponse:
      properties:
        data:
          items:
            $ref: "#/components/schemas/models.TrendingTickersListData"
          type: array
        ok:
          type: boolean
      type: object
    models.TrendingTickersListData:
      properties:
        count:
          type: integer
        pct_chg:
          type: integer
        security:
          $ref: "#/components/schemas/models.Security"
      type: object
servers:
  - url: https://api.benzinga.com
    description: PROD
